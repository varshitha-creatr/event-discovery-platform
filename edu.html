<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Streaming Service</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 20px;
}

header {
    background-color: #222;
    color: white;
    padding: 15px;
    text-align: center;
}

section {
    background: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 5px;
}

audio, video {
    width: 100%;
    margin-top: 10px;
}

.playlist-title {
    color: #333;
    font-weight: bold;
}

.transcript {
    background: #eee;
    padding: 10px;
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>🎵 My Music Streaming Service</h1>
    <p>Accessible Music for Everyone</p>
</header>

<!-- Audio Playlist 1 -->
<section tabindex="0">
    <p class="playlist-title">Playlist 1: Chill Beats</p>

    <audio controls aria-label="Chill Beats Audio Player">
        <source src="song1.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <audio controls aria-label="Relax Music Player">
        <source src="song2.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>
</section>

<!-- Video with Lyrics -->
<section tabindex="0">
    <p class="playlist-title">Song with Video Lyrics</p>

    <video controls aria-label="Song Video with Lyrics">
        <source src="lyrics-video.mp4" type="video/mp4">

        <!-- Captions for hearing-impaired users -->
        <track kind="captions" src="captions.vtt" srclang="en" label="English Captions" default>
        Your browser does not support video.
    </video>

    <!-- Text Transcript -->
    <div class="transcript">
        <strong>Lyrics Transcript:</strong><br>
        🎶 When the music starts to play,<br>
        🎶 Feel the rhythm, feel the sway...
    </div>
</section>

<footer>
    <p>© 2026 Music Streaming Service</p>
</footer>

</body>
</html>
